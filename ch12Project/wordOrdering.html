<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Ordering</title>
    <script src="wordOrdering.js" defer></script>
</head>
<body>
    <h1>Word Ordering</h1>
    <h3>Enter a list of words separated by spaces.</h3>
    
    <label for="wordInput">Word list:</label>
    <input type="text" id="wordInput" size="50">
    <br><br>
    
    <button id="alphaBtn">Alphabetical</button>
    <button id="revAlphaBtn">Reverse alphabetical</button>
    <button id="randomBtn">Random</button>
    
    <p id="errorMessage" style="color: red;"></p>
</body>
</html>
