<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentence Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="document.getElementById('wordInput').focus()">

    <h1>Sentence Builder</h1>

    <noscript>
        <p>This page requires JavaScript to function correctly. Please enable it in your browser settings.</p>
    </noscript>

    <form id="builderForm">
        <label id="promptLabel" for="wordInput">Starting word for your sentence:</label>
        <input type="text" id="wordInput">
        <br><br>
        <button type="button" id="addBtn">Add Word</button>
        <button type="button" id="startBtn">Start Over</button>
    </form>

    <p id="sentenceDisplay"></p>

    <script src="script.js"></script>
</body>
</html>
